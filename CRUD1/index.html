<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>นำเข้าข้อมูล</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#6dd5ed,#2193b0);
    min-height: 100vh;
}

/* Card */
.card {
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Header */
.card-header {
    background: linear-gradient(45deg,#ff6a00,#ee0979);
    text-align: center;
    font-size: 20px;
    letter-spacing: 1px;
}

/* Map */
#map {
    height: 420px;
    border-radius: 15px;
    border: 3px solid #fff;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Input */
.form-control, .form-select {
    border-radius: 12px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

.form-control:focus {
    border-color: #ff6a00;
    box-shadow: 0 0 5px #ff6a00;
}

/* Label */
.form-label {
    font-weight: bold;
    color: #333;
}

/* Button */
.btn-primary {
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    border: none;
    font-weight: bold;
    letter-spacing: 1px;
    transition: 0.3s;
}

.btn-primary:hover {
    transform: scale(1.03);
    background: linear-gradient(45deg,#ff6a00,#ee0979);
}

/* Section title */
.section-title {
    background: #f8f9fa;
    padding: 8px 12px;
    border-radius: 10px;
    font-weight: bold;
    margin-bottom: 10px;
    border-left: 5px solid #ff6a00;
}
</style>

</head>

<body>

<div class="container mt-5 mb-5">

<div class="card border-0">

<div class="card-header text-white">
🌍 ระบบนำเข้าข้อมูลสถานที่ท่องเที่ยว
</div>

<div class="card-body">

<form action="sample.php" method="POST" enctype="multipart/form-data">

<div class="section-title">📍 ข้อมูลสถานที่</div>

<div class="mb-3">
<label class="form-label">ชื่อสถานที่ท่องเที่ยว</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">คำอธิบายสถานที่</label>
<textarea name="description" class="form-control" rows="3"></textarea>
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label">ประเภทสถานที่</label>
<select name="typeplace" class="form-select">
<option value="">เลือกประเภท</option>
<option>โบราณสถาน</option>
<option>ศาสนสถาน</option>
<option>พิพิธภัณฑ์</option>
<option>ธรรมชาติ</option>
<option>ชุมชน</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">หน่วยงานดูแล</label>
<select name="ownplace" class="form-select">
<option value="">เลือกหน่วยงาน</option>
<option>หน่วยงานภาครัฐ</option>
<option>หน่วยงานเอกชน</option>
<option>อบจ.</option>
<option>อบต.</option>
<option>กระทรวงต่างๆ</option>
<option>กรมศิลปกร</option>
<option>ชุมชน</option>
</select>
</div>
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label">📷 รูปภาพ</label>
<input type="file" name="photo" class="form-control" accept="image/*" required>
</div>

<hr>

<div class="section-title">🗺️ เลือกพิกัดบนแผนที่</div>
<div id="map"></div>

<div class="row mt-3">
<div class="col-md-6 mb-3">
<label class="form-label">Latitude</label>
<input type="text" name="latitude" id="lat" class="form-control" readonly required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Longitude</label>
<input type="text" name="longitude" id="lng" class="form-control" readonly required>
</div>
</div>

<button type="submit" name="submit" class="btn btn-primary btn-lg w-100">
💾 บันทึกข้อมูล
</button>

</form>

</div>
</div>
</div>

<script>
let map, marker;

function initMap() {

    const myLatLng = { lat: 6.7271, lng: 100.0645 };

    map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        center: myLatLng
    });

    marker = new google.maps.Marker({
        position: myLatLng,
        map: map,
        draggable: true
    });

    // set ค่าเริ่มต้น
    document.getElementById("lat").value = myLatLng.lat;
    document.getElementById("lng").value = myLatLng.lng;

    // click map
    map.addListener("click", function(e){
        marker.setPosition(e.latLng);

        document.getElementById("lat").value = e.latLng.lat().toFixed(6);
        document.getElementById("lng").value = e.latLng.lng().toFixed(6);
    });

    // drag marker
    marker.addListener("dragend", function(e){
        document.getElementById("lat").value = e.latLng.lat().toFixed(6);
        document.getElementById("lng").value = e.latLng.lng().toFixed(6);
    });

}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC5l0aPyGFqiqY5DpqOYf-8YhN_eYHHobU&callback=initMap">
</script>
</body>
</html>
